services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kidzventure
    volumes:
      - kidzventure_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/kidzventure
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/kidzventure
    depends_on:
      db:
        condition: service_healthy

volumes:
  kidzventure_pg:
